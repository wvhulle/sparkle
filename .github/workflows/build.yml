name: Build

on:
  push:
    branches: [ main, master, feature/* ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  deployments: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Elan
      run: |
        curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Update PATH
      run: echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Install Lean toolchain
      run: |
        elan default $(cat lean-toolchain)

    # NB: no `lake update` here.  The committed
    # `lake-manifest.json` pins LSpec / doc-gen4 / etc. to
    # commits that are compatible with the toolchain in
    # `lean-toolchain`.  Re-running `lake update` would pull
    # the latest upstream LSpec, which may have moved to a
    # newer Lean version (e.g. 4.29+) and would force a
    # toolchain upgrade on us, breaking the build.

    # ---- Core Build ----

    - name: Build project
      run: lake build

    # ---- Examples ----

    - name: Run Counter example
      run: lake env lean --run Examples/Counter.lean

    - name: Tutorial syntax check (docs/Tutorial.md)
      run: bash scripts/check_tutorial.sh

    - name: Tutorial runtime smoke test (executes the Step-1 counter)
      run: lake exe tutorial-smoke

    - name: Run Sparkle-16 CPU Core
      run: lake env lean --run Examples/Sparkle16/Core.lean

    - name: Build RV32 Signal DSL
      run: lake build IP.RV32

    - name: Build CDC Multi-Clock example
      run: lake build Examples.CDC

    # ---- H.264 Video Codec — Verilog Generation ----

    - name: Build H.264 IP library (all synth modules + Verilog generation)
      run: lake build IP.Video

    - name: Verify H.264 Verilog files generated
      run: |
        echo "=== H.264 Generated Verilog Files ==="
        ls -la .lake/build/gen/h264/*.sv 2>/dev/null || echo "No .sv files found"
        ls -la .lake/build/gen/h264/*_cppsim.h 2>/dev/null || echo "No CppSim files found"
        # Check key modules were generated
        test -f .lake/build/gen/h264/idct.sv && echo "✓ IDCT module"
        test -f .lake/build/gen/h264/fwd_dct.sv && echo "✓ Forward DCT module"
        test -f .lake/build/gen/h264/fwd_quant.sv && echo "✓ Forward Quant module"
        test -f .lake/build/gen/h264/dequant.sv && echo "✓ Dequant module"
        test -f .lake/build/gen/h264/reconstruct.sv && echo "✓ Reconstruct module"
        test -f .lake/build/gen/h264/decoder_pipeline.sv && echo "✓ Decoder Pipeline module"
        test -f .lake/build/gen/h264/encoder_pipeline.sv && echo "✓ Encoder Pipeline module"
        test -f .lake/build/gen/h264/cavlc_synth.sv && echo "✓ CAVLC Synth module"
        test -f .lake/build/gen/h264/nal_stream.sv && echo "✓ NAL Stream module"
        test -f .lake/build/gen/h264/frame_encoder.sv && echo "✓ Frame Encoder module"
        test -f .lake/build/gen/h264/mp4_encoder.sv && echo "✓ MP4 Encoder module"
        test -f .lake/build/gen/h264/quant_roundtrip.sv && echo "✓ Quant Roundtrip module"

    # ---- Formal Proofs ----

    - name: Build ISA Proofs
      run: lake build Sparkle.Verification.ISAProps

    - name: Run ISA Proof Tests
      run: lake env lean --run Examples/Sparkle16/ISAProofTests.lean

    - name: Build CDC Formal Proofs (12 theorems, no sorry)
      run: lake build Sparkle.Verification.CDCProps

    - name: Build Counter Formal Proofs (verilog! macro + auto-assert)
      run: lake build Sparkle.Verification.CounterProps

    # ---- Synthesis Tests ----

    - name: Build SoC Verilog (generates verilator/ files)
      run: lake build IP.RV32.SoCVerilog

    - name: Run Verilog generation tests
      run: lake exe verilog-tests

    - name: Run Compiler improvement tests (complement, lambda, hw_let)
      run: lake env lean Tests/CompilerTests.lean

    # ---- Oracle Accuracy Tests ----

    - name: Run oracle accuracy tests (halt loop detection, timer skip, MIE/MTIE guard)
      run: lake exe oracle-accuracy-test

    # ---- SVParser Tests ----

    - name: "Run SVParser tests (34 tests: parse, lower, JIT, pcpi_mul, byte-lane, replication)"
      run: lake exe svparser-test

    # ---- RV32 JIT vs Verilator Benchmark ----
    # Signal DSL RV32 SoC (122 registers, 4-stage pipeline)
    # Runs 10M cycles with both backends, compares cyc/s

    - name: Install Verilator
      run: sudo apt-get install -y verilator

    - name: Build Verilator simulation
      run: cd verilator && make build

    - name: "Build JIT shared library (.so)"
      run: |
        cd verilator
        g++ -O2 -std=c++17 -shared -fPIC -o generated_soc_jit.so generated_soc_jit.cpp

    - name: "Build benchmark binaries"
      run: |
        cd verilator
        # JIT bench
        g++ -O2 -std=c++17 -o jit_bench tb_jit_bench.cpp -ldl
        # Verilator bench — link model objects but exclude tb_soc.o (has its own main)
        VERILATOR_ROOT=$(verilator --getenv VERILATOR_ROOT)
        g++ -O2 -std=c++17 -o verilator_bench tb_verilator_bench.cpp \
            $(ls obj_dir/*.o | grep -v tb_soc) \
            -Iobj_dir -I${VERILATOR_ROOT}/include -I${VERILATOR_ROOT}/include/vltstd \
            -lpthread

    - name: "Run RV32 benchmark (10M cycles, Verilator vs JIT)"
      run: |
        cd verilator
        CYCLES=10000000

        echo "=== Verilator Benchmark ==="
        ./verilator_bench ../firmware/firmware.hex $CYCLES 2>&1 | tee verilator_output.txt

        echo ""
        echo "=== JIT Benchmark ==="
        ./jit_bench ../firmware/firmware.hex $CYCLES ./generated_soc_jit.so 2>&1 | tee jit_output.txt

    - name: Parse benchmark results
      run: |
        set -euo pipefail
        cd verilator
        sanitize_num() {
          local n="$1"
          n=$(echo "$n" | tr -cd '0-9')
          [ -z "$n" ] && n=0
          echo "$n"
        }
        # Extract cycles/sec from Verilator output
        VERILATOR_CPS=$(sanitize_num "$(grep -oE '[0-9]+ cycles/sec' verilator_output.txt | head -1 | awk '{print $1}')")
        # Extract cycles/sec from JIT output (Benchmark 1: pure eval+tick)
        JIT_PURE_CPS=$(sanitize_num "$(grep 'cycles/sec' jit_output.txt | head -1 | grep -oE '[0-9]+ cycles/sec' | awk '{print $1}')")
        # Benchmark 4: evalTick (fused)
        JIT_FUSED_CPS=$(sanitize_num "$(grep 'cycles/sec' jit_output.txt | grep -A0 'evalTick' | grep -oE '[0-9]+ cycles/sec' | head -1 | awk '{print $1}')")
        # Benchmark 5: evalTick + 6 wires
        JIT_6WIRE_CPS=$(sanitize_num "$(grep 'cycles/sec' jit_output.txt | tail -1 | grep -oE '[0-9]+ cycles/sec' | awk '{print $1}')")

        echo "Verilator:        ${VERILATOR_CPS} cyc/s"
        echo "JIT eval+tick:    ${JIT_PURE_CPS} cyc/s"
        echo "JIT evalTick:     ${JIT_FUSED_CPS} cyc/s"
        echo "JIT evalTick+6w:  ${JIT_6WIRE_CPS} cyc/s"

        python3 - <<PYEOF > ../rv32-bench-results.json
        import json
        data = [
          {"name": "Verilator (10M cycles)",             "unit": "cycles/sec", "value": int("${VERILATOR_CPS}")},
          {"name": "JIT eval+tick (10M cycles)",         "unit": "cycles/sec", "value": int("${JIT_PURE_CPS}")},
          {"name": "JIT evalTick fused (10M cycles)",    "unit": "cycles/sec", "value": int("${JIT_FUSED_CPS}")},
          {"name": "JIT evalTick+6wires (10M cycles)",   "unit": "cycles/sec", "value": int("${JIT_6WIRE_CPS}")},
        ]
        print(json.dumps(data, indent=2))
        PYEOF

        echo "--- rv32-bench-results.json ---"
        cat ../rv32-bench-results.json
        python3 -c "
        import json
        with open('../rv32-bench-results.json') as f: data = json.load(f)
        assert isinstance(data, list) and len(data) > 0
        for i, e in enumerate(data):
            for k in ('name', 'unit', 'value'): assert k in e, f'entry {i} missing {k}'
            assert isinstance(e['value'], (int, float))
        print('rv32-bench-results.json validated ok:', len(data), 'entries')
        "

    - name: Stash local changes before benchmark push
      if: github.event_name == 'push'
      run: |
        # Save benchmark JSON outside the repo before stashing
        cp rv32-bench-results.json /tmp/rv32-bench-results.json
        git stash || true
        cp /tmp/rv32-bench-results.json rv32-bench-results.json

    - name: Store RV32 benchmark result
      uses: benchmark-action/github-action-benchmark@v1
      if: github.event_name == 'push'
      with:
        name: RV32 SoC Simulation Benchmark (Verilator vs JIT)
        tool: customBiggerIsBetter
        output-file-path: rv32-bench-results.json
        benchmark-data-dir-path: dev/rv32-bench
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true
        alert-threshold: "80%"
        comment-on-alert: true
        fail-on-alert: false

    # ---- LiteX SoC Benchmark ----

    - name: "Fetch PicoRV32 RTL for LiteX benchmark"
      run: |
        curl -sL https://raw.githubusercontent.com/YosysHQ/picorv32/main/picorv32.v -o /tmp/picorv32.v
        echo "PicoRV32: $(wc -l < /tmp/picorv32.v) lines"

    - name: "Build LiteX Verilator simulation"
      run: |
        python3 Tests/SVParser/fixtures/gen_litex_multicore.py 1
        cat Tests/SVParser/fixtures/litex_1core.v /tmp/picorv32.v > /tmp/litex_verilator.v
        cat > /tmp/tb_litex.cpp << 'TBEOF'
        #include <cstdio>
        #include <cstdint>
        #include <chrono>
        #include "Vsim_1core.h"
        int main() {
            auto* top = new Vsim_1core;
            top->sys_clk = 0; top->eval();
            auto t0 = std::chrono::high_resolution_clock::now();
            for (uint64_t c = 0; c < 10000000; c++) {
                top->sys_clk = 1; top->eval();
                top->sys_clk = 0; top->eval();
            }
            auto t1 = std::chrono::high_resolution_clock::now();
            double ms = std::chrono::duration<double,std::milli>(t1-t0).count();
            printf("%d\n", (int)(10000000.0/ms*1000.0));
            delete top; return 0;
        }
        TBEOF
        verilator --cc --exe --build -j 0 \
          -Wno-WIDTHEXPAND -Wno-WIDTHTRUNC -Wno-UNUSEDSIGNAL \
          -Wno-CASEINCOMPLETE -Wno-UNOPTFLAT -Wno-LATCH -Wno-MULTIDRIVEN \
          -Wno-COMBDLY -Wno-PINMISSING \
          --top-module sim_1core -CFLAGS "-O2" \
          /tmp/litex_verilator.v /tmp/tb_litex.cpp --Mdir /tmp/litex_obj

    - name: "Build LiteX JIT"
      run: |
        python3 -c "
        import re
        with open('Tests/SVParser/fixtures/litex_sim_minimal.v') as f: litex = f.read()
        pico = ''
        try:
            with open('/tmp/picorv32.v') as f: pico = f.read()
        except: pass
        c = litex + '\n' + pico
        c = c.replace('@(*)', '@*')
        lines = c.split('\n')
        r = ['' if l.lstrip().startswith('integer ') else (l.split('begin : ')[0]+'begin' if 'begin : ' in l else l) for l in lines]
        c = '\n'.join(r)
        import re as _re
        pat = r'for\s*\((\w+)\s*=\s*0\s*;\s*\1\s*<\s*4\s*;\s*\1\s*=\s*\1\s*\+\s*1\)\s*\n((?:\t\t|\s{8}).*(?:\n(?:\t\t\t|\s{12}).*)*)'
        c = _re.sub(pat, lambda m: '\n'.join(m.group(2).replace(f'{m.group(1)}*8',f'{i*8}').replace(f'{m.group(1)}]',f'{i}]') for i in range(4)), c)
        p2 = r'if \((\w+)\[0\]\)\s*\n\s*(\w+)\[(\w+)\]\[0 \+: 8\] <= (\w+)\[0 \+: 8\];'
        for m in _re.finditer(p2, c):
            we,arr,addr,data = m.group(1),m.group(2),m.group(3),m.group(4)
            rep = f'\tif ({we}) {arr}[{addr}] <= {data};'
            for i in range(4):
                old = f'\tif ({we}[{i}])\n\t\t\t{arr}[{addr}][{i*8} +: 8] <= {data}[{i*8} +: 8];'
                c = c.replace(old, rep if i==0 else '')
        with open('/tmp/litex_pp.v','w') as f: f.write(c)
        "
        cat > /tmp/gen_litex_jit.lean << 'GENEOF'
        import Tools.SVParser
        import Sparkle.Backend.CppSim
        open Tools.SVParser.Lower
        def main : IO Unit := do
          let src ← IO.FS.readFile "/tmp/litex_pp.v"
          let design ← IO.ofExcept (parseAndLowerFlat src)
          let jitCpp := Sparkle.Backend.CppSim.toCppSimJIT design
          IO.FS.writeFile "/tmp/litex_jit.cpp" jitCpp
        GENEOF
        # Ensure Tools.SVParser / Sparkle.Backend.CppSim oleans match the current
        # toolchain before `lake env lean --run`, which does NOT rebuild but
        # reads existing oleans and would otherwise fail with "incompatible
        # header" if the cache was produced by an older Lean version.
        lake build Tools.SVParser Sparkle.Backend.CppSim
        lake env lean --run /tmp/gen_litex_jit.lean
        g++ -O2 -std=c++17 -shared -fPIC -o /tmp/litex_jit.so /tmp/litex_jit.cpp

    - name: "Run LiteX benchmark (10M cycles)"
      run: |
        set -euo pipefail
        # --- Verilator ---
        # Run twice: first capture stderr for diagnostics, second capture stdout only.
        echo "--- Vsim_1core raw output ---"
        /tmp/litex_obj/Vsim_1core || echo "Vsim_1core exited nonzero"
        LITEX_VLTR_RAW=$(/tmp/litex_obj/Vsim_1core 2>/dev/null || echo 0)
        # Keep only the LAST line and strip to digits to guard against
        # stray warnings ending up in command substitution output.
        LITEX_VLTR=$(echo "$LITEX_VLTR_RAW" | tail -n1 | tr -cd '0-9')
        [ -z "$LITEX_VLTR" ] && LITEX_VLTR=0
        echo "LiteX Verilator: ${LITEX_VLTR} cyc/s"

        # --- JIT ---
        cat > /tmp/bench_litex.cpp << 'BEOF'
        #include <cstdio>
        #include <cstdint>
        #include <chrono>
        #include <dlfcn.h>
        typedef void* (*fn0)(); typedef void (*fn1)(void*);
        int main() {
            void* lib = dlopen("/tmp/litex_jit.so", RTLD_LAZY);
            if (!lib) { fprintf(stderr, "dlopen failed: %s\n", dlerror()); return 1; }
            auto create = (fn0)dlsym(lib,"jit_create");
            auto destroy = (fn1)dlsym(lib,"jit_destroy");
            auto reset = (fn1)dlsym(lib,"jit_reset");
            auto et = (fn1)dlsym(lib,"jit_eval_tick");
            if (!create || !destroy || !reset || !et) {
                fprintf(stderr, "dlsym failed\n"); return 1;
            }
            void* ctx = create(); reset(ctx);
            auto t0 = std::chrono::high_resolution_clock::now();
            for (uint64_t c = 0; c < 10000000; c++) et(ctx);
            auto t1 = std::chrono::high_resolution_clock::now();
            double ms = std::chrono::duration<double,std::milli>(t1-t0).count();
            printf("%d\n", (int)(10000000.0/ms*1000.0));
            destroy(ctx); dlclose(lib); return 0;
        }
        BEOF
        g++ -O2 -std=c++17 -o /tmp/bench_litex /tmp/bench_litex.cpp -ldl
        LITEX_JIT_RAW=$(/tmp/bench_litex 2>&1 || echo 0)
        echo "--- bench_litex raw output ---"
        echo "$LITEX_JIT_RAW"
        LITEX_JIT=$(echo "$LITEX_JIT_RAW" | tail -n1 | tr -cd '0-9')
        [ -z "$LITEX_JIT" ] && LITEX_JIT=0
        echo "LiteX JIT: ${LITEX_JIT} cyc/s"

        # --- Write benchmark JSON via Python for bulletproof formatting ---
        python3 - <<PYEOF > litex-bench-results.json
        import json
        data = [
          {"name": "LiteX Verilator (10M cycles)", "unit": "cycles/sec", "value": int("${LITEX_VLTR}")},
          {"name": "LiteX JIT evalTick (10M cycles)", "unit": "cycles/sec", "value": int("${LITEX_JIT}")},
        ]
        print(json.dumps(data, indent=2))
        PYEOF

        echo "--- litex-bench-results.json ---"
        cat litex-bench-results.json
        # Validate JSON shape before handing it to benchmark-action
        python3 -c "
        import json, sys
        with open('litex-bench-results.json') as f: data = json.load(f)
        assert isinstance(data, list) and len(data) > 0, 'must be a non-empty list'
        for i, e in enumerate(data):
            assert isinstance(e, dict), f'entry {i} must be object'
            for k in ('name', 'unit', 'value'):
                assert k in e, f'entry {i} missing key {k}'
            assert isinstance(e['value'], (int, float)), f'entry {i} value must be number, got {type(e[\"value\"]).__name__}'
        print('litex-bench-results.json validated ok:', len(data), 'entries')
        "

    - name: Store LiteX benchmark result
      uses: benchmark-action/github-action-benchmark@v1
      if: github.event_name == 'push'
      with:
        name: LiteX PicoRV32 SoC Benchmark (Verilator vs JIT)
        tool: customBiggerIsBetter
        output-file-path: litex-bench-results.json
        benchmark-data-dir-path: dev/litex-bench
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true
        alert-threshold: "80%"
        comment-on-alert: true
        fail-on-alert: false

    # ---- Multi-Core Parallel Benchmark ----

    - name: "Build multi-core JIT (hierarchical)"
      run: |
        # Generate 8-core wrapper (Verilator-style hierarchy)
        for n in 1 8; do
          python3 Tests/SVParser/fixtures/gen_litex_multicore.py $n
        done
        # Generate hierarchical JIT
        cat > /tmp/gen_hier_jit.lean << 'GENEOF'
        import Tools.SVParser
        import Sparkle.Backend.CppSim
        open Tools.SVParser.Lower
        def main : IO Unit := do
          let src ← IO.FS.readFile "Tests/SVParser/fixtures/litex_1core.v"
          let pico ← IO.FS.readFile "/tmp/picorv32.v"
          let design ← IO.ofExcept (parseAndLowerHierarchical (src ++ "\n" ++ pico))
          let jitCpp := Sparkle.Backend.CppSim.toCppSimJIT design
          IO.FS.writeFile "/tmp/sparkle_hier.cpp" jitCpp
          IO.println s!"JIT: {jitCpp.length} chars, {design.modules.length} modules"
        GENEOF
        lake env lean --run /tmp/gen_hier_jit.lean
        g++ -O2 -std=c++17 -shared -fPIC -o /tmp/sparkle_hier.so /tmp/sparkle_hier.cpp

    - name: "Build multi-core runner"
      run: g++ -O2 -std=c++20 -shared -fPIC -o /tmp/multicore_runner.so c_src/cdc/multicore_runner.cpp -lpthread

    - name: "Build Verilator 8-core"
      run: |
        cat Tests/SVParser/fixtures/litex_8core.v /tmp/picorv32.v > /tmp/litex_8core.v
        cat > /tmp/tb_8core.cpp << 'TBEOF'
        #include <cstdio>
        #include <cstdint>
        #include <chrono>
        #include "Vsim_8core.h"
        int main() {
            auto* top = new Vsim_8core;
            top->sys_clk = 0;
            top->serial_sink_data_0 = 0; top->serial_sink_valid_0 = 0; top->serial_source_ready_0 = 1;
            top->serial_sink_data_1 = 0; top->serial_sink_valid_1 = 0; top->serial_source_ready_1 = 1;
            top->serial_sink_data_2 = 0; top->serial_sink_valid_2 = 0; top->serial_source_ready_2 = 1;
            top->serial_sink_data_3 = 0; top->serial_sink_valid_3 = 0; top->serial_source_ready_3 = 1;
            top->serial_sink_data_4 = 0; top->serial_sink_valid_4 = 0; top->serial_source_ready_4 = 1;
            top->serial_sink_data_5 = 0; top->serial_sink_valid_5 = 0; top->serial_source_ready_5 = 1;
            top->serial_sink_data_6 = 0; top->serial_sink_valid_6 = 0; top->serial_source_ready_6 = 1;
            top->serial_sink_data_7 = 0; top->serial_sink_valid_7 = 0; top->serial_source_ready_7 = 1;
            top->eval();
            auto t0 = std::chrono::high_resolution_clock::now();
            for (uint64_t c = 0; c < 10000000; c++) {
                top->sys_clk = 1; top->eval();
                top->sys_clk = 0; top->eval();
            }
            auto t1 = std::chrono::high_resolution_clock::now();
            double ms = std::chrono::duration<double,std::milli>(t1-t0).count();
            printf("%d\n", (int)(10000000.0/ms*1000.0));
            delete top; return 0;
        }
        TBEOF
        verilator --cc --exe --build -j 0 \
          -Wno-WIDTHEXPAND -Wno-WIDTHTRUNC -Wno-UNUSEDSIGNAL \
          -Wno-CASEINCOMPLETE -Wno-UNOPTFLAT -Wno-LATCH -Wno-MULTIDRIVEN \
          -Wno-COMBDLY -Wno-PINMISSING -Wno-UNDRIVEN \
          --top-module sim_8core -CFLAGS "-O2" \
          /tmp/litex_8core.v /tmp/tb_8core.cpp --Mdir /tmp/litex_8core_obj

    - name: "Run multi-core benchmark"
      run: |
        set -euo pipefail
        # Extract trailing numeric value from a possibly-noisy binary's
        # combined stdout+stderr. Falls back to 0 on any failure.
        sanitize_num() {
          local raw="$1"
          local n
          n=$(echo "$raw" | tail -n1 | tr -cd '0-9')
          [ -z "$n" ] && n=0
          echo "$n"
        }

        # 1-core single-thread baseline
        cat > /tmp/bench_1core.cpp << 'BEOF'
        #include <cstdio>
        #include <cstdint>
        #include <chrono>
        #include <dlfcn.h>
        typedef void* (*fn0)(); typedef void (*fn1)(void*);
        int main() {
            void* lib = dlopen("/tmp/sparkle_hier.so", RTLD_LAZY);
            if (!lib) { fprintf(stderr, "dlopen failed: %s\n", dlerror()); return 1; }
            auto create = (fn0)dlsym(lib,"jit_create");
            auto destroy = (fn1)dlsym(lib,"jit_destroy");
            auto reset = (fn1)dlsym(lib,"jit_reset");
            auto et = (fn1)dlsym(lib,"jit_eval_tick");
            if (!create || !destroy || !reset || !et) { fprintf(stderr, "dlsym failed\n"); return 1; }
            void* ctx = create(); reset(ctx);
            auto t0 = std::chrono::high_resolution_clock::now();
            for (uint64_t c = 0; c < 10000000; c++) et(ctx);
            auto t1 = std::chrono::high_resolution_clock::now();
            double ms = std::chrono::duration<double,std::milli>(t1-t0).count();
            printf("%d\n", (int)(10000000.0/ms*1000.0));
            destroy(ctx); dlclose(lib); return 0;
        }
        BEOF
        g++ -O2 -std=c++17 -o /tmp/bench_1core /tmp/bench_1core.cpp -ldl
        JIT_1CORE_RAW=$(/tmp/bench_1core 2>&1 || echo 0)
        echo "--- bench_1core raw ---"; echo "$JIT_1CORE_RAW"
        JIT_1CORE=$(sanitize_num "$JIT_1CORE_RAW")
        echo "JIT 1-core: ${JIT_1CORE} cyc/s"

        # 8-core sequential
        cat > /tmp/bench_8seq.cpp << 'BEOF'
        #include <cstdio>
        #include <cstdint>
        #include <chrono>
        #include <dlfcn.h>
        typedef void* (*fn0)(); typedef void (*fn1)(void*);
        int main() {
            void* lib = dlopen("/tmp/sparkle_hier.so", RTLD_LAZY);
            if (!lib) { fprintf(stderr, "dlopen failed: %s\n", dlerror()); return 1; }
            auto create = (fn0)dlsym(lib,"jit_create");
            auto destroy = (fn1)dlsym(lib,"jit_destroy");
            auto reset = (fn1)dlsym(lib,"jit_reset");
            auto et = (fn1)dlsym(lib,"jit_eval_tick");
            if (!create || !destroy || !reset || !et) { fprintf(stderr, "dlsym failed\n"); return 1; }
            void* cores[8];
            for (int i = 0; i < 8; i++) { cores[i] = create(); reset(cores[i]); }
            auto t0 = std::chrono::high_resolution_clock::now();
            for (uint64_t c = 0; c < 10000000; c++)
                for (int i = 0; i < 8; i++) et(cores[i]);
            auto t1 = std::chrono::high_resolution_clock::now();
            double ms = std::chrono::duration<double,std::milli>(t1-t0).count();
            printf("%d\n", (int)(10000000.0/ms*1000.0));
            for (int i = 0; i < 8; i++) destroy(cores[i]);
            dlclose(lib); return 0;
        }
        BEOF
        g++ -O2 -std=c++17 -o /tmp/bench_8seq /tmp/bench_8seq.cpp -ldl
        JIT_8SEQ_RAW=$(/tmp/bench_8seq 2>&1 || echo 0)
        echo "--- bench_8seq raw ---"; echo "$JIT_8SEQ_RAW"
        JIT_8SEQ=$(sanitize_num "$JIT_8SEQ_RAW")
        echo "JIT 8-core sequential: ${JIT_8SEQ} per-core cyc/s"

        # 8-core parallel (batch=10000)
        cat > /tmp/bench_8par.cpp << 'BEOF'
        #include <cstdio>
        #include <cstdint>
        #include <dlfcn.h>
        struct MulticoreResult { uint64_t total_cycles; double elapsed_ms; double mcycles_per_sec; int success; };
        typedef MulticoreResult (*mc_fn)(void*, int, uint64_t, int);
        int main() {
            void* jit = dlopen("/tmp/sparkle_hier.so", RTLD_LAZY);
            void* runner = dlopen("/tmp/multicore_runner.so", RTLD_LAZY);
            if (!jit || !runner) { fprintf(stderr, "dlopen failed: %s\n", dlerror()); return 1; }
            auto mc_run = (mc_fn)dlsym(runner, "multicore_run");
            if (!mc_run) { fprintf(stderr, "dlsym failed\n"); return 1; }
            auto r = mc_run(jit, 8, 10000000, 10000);
            printf("%d\n", (int)(r.mcycles_per_sec * 1000000.0));
            dlclose(runner); dlclose(jit); return 0;
        }
        BEOF
        g++ -O2 -std=c++17 -o /tmp/bench_8par /tmp/bench_8par.cpp -ldl
        JIT_8PAR_RAW=$(/tmp/bench_8par 2>&1 || echo 0)
        echo "--- bench_8par raw ---"; echo "$JIT_8PAR_RAW"
        JIT_8PAR=$(sanitize_num "$JIT_8PAR_RAW")
        echo "JIT 8-core parallel: ${JIT_8PAR} per-core cyc/s"

        # Verilator 8-core. Verilator prints %Warning/%Error diagnostics
        # on stdout at runtime (e.g. width truncation, undriven signals)
        # that were poisoning the JSON. We capture stderr too for logs,
        # then keep only the trailing numeric line for the JSON value.
        VLTR_8CORE_RAW=$(/tmp/litex_8core_obj/Vsim_8core 2>&1 || echo 0)
        echo "--- Vsim_8core raw ---"; echo "$VLTR_8CORE_RAW"
        VLTR_8CORE=$(sanitize_num "$VLTR_8CORE_RAW")
        echo "Verilator 8-core: ${VLTR_8CORE} cyc/s"

        # --- Write JSON via Python for bulletproof formatting ---
        python3 - <<PYEOF > multicore-bench-results.json
        import json
        data = [
          {"name": "JIT 1-core single-thread",        "unit": "cycles/sec", "value": int("${JIT_1CORE}")},
          {"name": "JIT 8-core sequential",           "unit": "cycles/sec", "value": int("${JIT_8SEQ}")},
          {"name": "JIT 8-core parallel (batch=10K)", "unit": "cycles/sec", "value": int("${JIT_8PAR}")},
          {"name": "Verilator 8-core",                "unit": "cycles/sec", "value": int("${VLTR_8CORE}")},
        ]
        print(json.dumps(data, indent=2))
        PYEOF

        echo "--- multicore-bench-results.json ---"
        cat multicore-bench-results.json
        python3 -c "
        import json
        with open('multicore-bench-results.json') as f: data = json.load(f)
        assert isinstance(data, list) and len(data) > 0
        for i, e in enumerate(data):
            assert isinstance(e, dict)
            for k in ('name', 'unit', 'value'): assert k in e, f'entry {i} missing {k}'
            assert isinstance(e['value'], (int, float)), f'entry {i} value not numeric: {e[\"value\"]!r}'
        print('multicore-bench-results.json validated ok:', len(data), 'entries')
        "

    - name: Store multi-core benchmark result
      uses: benchmark-action/github-action-benchmark@v1
      if: github.event_name == 'push'
      with:
        name: Multi-Core Benchmark (8-core LiteX PicoRV32)
        tool: customBiggerIsBetter
        output-file-path: multicore-bench-results.json
        benchmark-data-dir-path: dev/multicore-bench
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true
        alert-threshold: "80%"
        comment-on-alert: true
        fail-on-alert: false

    # ---- Unit Tests ----

    - name: Run full test suite (481 tests)
      run: lake exe test

    # ---- CDC Lock-Free Queue ----

    - name: Build CDC C++ (SPSC queue + rollback + runner)
      run: make -C c_src/cdc all

    - name: Run CDC correctness tests (10M messages) + benchmark
      run: make -C c_src/cdc test

    - name: Run CDC multi-clock JIT simulation
      run: lake exe cdc-multi-clock-test

    # ---- Optional: iverilog ----

    - name: Verify with iverilog (optional)
      continue-on-error: true
      run: |
        if command -v iverilog &> /dev/null; then
          if [ -f "hw/sim/tb_rv32.v" ]; then
            iverilog -g2012 -o /tmp/rv32i_sim hw/gen/rv32i_soc.sv hw/sim/tb_rv32.v
            vvp /tmp/rv32i_sim
          else
            echo "No testbench found, skipping"
          fi
        else
          echo "iverilog not installed, skipping"
        fi

  # ---- Tutorial chapters (Markdown master + xlean-convert) ----
  tutorial-notebooks:
    runs-on: ubuntu-latest
    needs: build  # reuses Lake's package cache via the previous job's setup
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Elan
      run: |
        curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
        echo "$HOME/.elan/bin" >> $GITHUB_PATH

    - name: Install Lean toolchain
      run: elan default $(cat lean-toolchain)

    - name: Build xlean-convert from upstream xeus-lean
      run: |
        git clone --depth 1 https://github.com/Verilean/xeus-lean.git /tmp/xeus-lean
        cd /tmp/xeus-lean
        lake build xlean-convert
        echo "/tmp/xeus-lean/.lake/build/bin" >> $GITHUB_PATH

    - name: Generate .lean and .ipynb from Markdown
      run: bash docs/tutorial/build-from-md.sh

    # NB: no `lake update` — same reasoning as the main build
    # job above.  We rely on the committed `lake-manifest.json`.

    # Mode 1 — headless `lake build` (Display *shim* path).
    # No xeus-lean kernel: chapter cells use the in-repo
    # `docs/tutorial/Display.lean` shim that emits MIME markers.
    # Catches drift in the offline build path.
    - name: "Mode 1 — Build tutorial chapters with Display shim"
      run: lake build TutorialNotebooks

    # Mode 2 — execute the generated notebooks under the real
    # xeus-lean kernel so we catch drift in the kernel path too
    # (real Display.* implementations, real `#mermaid` /
    # `#help_x` / `#bash`).  We try to build the kernel; if the
    # CMake build fails (xeus / xtl / xwidgets headers missing
    # on the runner), we report it but don't fail the job — the
    # shim mode above is the bedrock.
    - name: "Mode 2 — Build xeus-lean kernel"
      id: kernel
      continue-on-error: true
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          libzmq3-dev libssl-dev nlohmann-json3-dev \
          uuid-dev cmake ninja-build
        python3 -m pip install --user jupyterlab nbconvert
        cd /tmp/xeus-lean
        bash build.sh
        # Register the kernel so nbconvert can find it.
        if [ -f /tmp/xeus-lean/share/jupyter/kernels/xlean/kernel.json ]; then
          mkdir -p ~/.local/share/jupyter/kernels/xlean
          cp -r /tmp/xeus-lean/share/jupyter/kernels/xlean/* \
                ~/.local/share/jupyter/kernels/xlean/
        fi

    - name: "Mode 2 — Execute tutorial notebooks under xeus-lean"
      if: steps.kernel.outcome == 'success'
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        for nb in docs/tutorial/Notebooks/Gen/notebooks/*.ipynb; do
          echo "=== executing $nb ==="
          jupyter nbconvert --to notebook --execute --inplace \
            --ExecutePreprocessor.kernel_name=xlean \
            --ExecutePreprocessor.timeout=120 \
            "$nb"
        done
