name: Tutorial Docker image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (defaults to "latest")'
        default: 'latest'

jobs:
  # Build each architecture on its own native runner.  Pushes by
  # digest only; the `merge` job below stitches the two digests into
  # a single multi-arch manifest list tagged for the registry.
  #
  # The previous single-runner workflow built linux/arm64 under
  # QEMU on an amd64 host, which made the arm64 leg of the build
  # (Lean toolchain + xeus-lean clang build) take ~hour scale.
  # Native arm64 runners bring it back to amd64 parity, so the
  # wall-clock time is now max(amd64, arm64) instead of
  # amd64 + (amd64 × ~5-10).
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64

    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve image owner (lowercase)
        id: owner
        run: |
          # ghcr.io requires repository names to be all-lowercase,
          # but `github.repository_owner` keeps the org's display
          # case (e.g. "Verilean").  Lowercase it here so the image
          # name is accepted by the registry.
          echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/tutorial/Dockerfile
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/${{ steps.owner.outputs.owner }}/sparkle-tutorial,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,scope=${{ matrix.suffix }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Combine the per-arch digests produced by `build` into a single
  # multi-arch manifest list and publish it under both the
  # release/dispatch tag and `:latest`.
  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Resolve image tag and owner
        id: tag
        run: |
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner=${owner_lc}" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${{ steps.tag.outputs.owner }}/sparkle-tutorial:${{ steps.tag.outputs.tag }} \
            -t ghcr.io/${{ steps.tag.outputs.owner }}/sparkle-tutorial:latest \
            $(printf 'ghcr.io/${{ steps.tag.outputs.owner }}/sparkle-tutorial@sha256:%s ' *)
