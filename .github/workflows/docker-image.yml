name: Tutorial Docker image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (defaults to "latest")'
        default: 'latest'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag and owner
        id: tag
        run: |
          # ghcr.io requires repository names to be all-lowercase, but
          # `github.repository_owner` keeps the org's display case
          # (e.g. "Verilean").  Lowercase it here so the image tag is
          # accepted by the registry.
          owner_lc="${GITHUB_REPOSITORY_OWNER,,}"
          echo "owner=${owner_lc}" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # `docker buildx` needs a buildx-capable builder + QEMU
      # bindings on the GHA runner to produce a multi-arch manifest.
      # Without these the `platforms:` field below is silently
      # ignored and we end up with a single amd64-only image,
      # which then runs under emulation on Apple Silicon Macs and
      # is unusably slow (the Lean kernel ends up taking minutes
      # per cell because every JIT op goes through QEMU).
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/tutorial/Dockerfile
          push: true
          # Build both architectures so Apple Silicon laptops pull
          # a native arm64 image rather than an amd64 image under
          # Rosetta/QEMU translation.  Native arm64 runs ~10-100×
          # faster on those hosts for cpu-bound Lean workloads.
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.tag.outputs.owner }}/sparkle-tutorial:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ steps.tag.outputs.owner }}/sparkle-tutorial:latest
